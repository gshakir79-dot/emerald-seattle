<style>
  :root { --ink:#0a1422; --mist:#93a9bd; --fog:#c6d4e0; --snow:#eef4f8; --emerald:#3ddc97; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--ink); color:var(--fog); font-family:"Outfit",sans-serif; font-weight:300;
    text-align:center; padding:2rem;
  }
  .kicker { font-family:"JetBrains Mono",monospace; font-size:.75rem; letter-spacing:.28em; color:var(--emerald); text-transform:uppercase; margin-bottom:1.4rem; }
  h1 { font-family:"Fraunces",serif; font-weight:340; font-size:clamp(2.6rem,7vw,4.5rem); color:var(--snow); line-height:1.05; margin-bottom:1.2rem; }
  h1 em { font-style:italic; color:var(--emerald); }
  p { color:var(--mist); max-width:420px; margin:0 auto 2.2rem; }
  a { display:inline-block; font-family:"JetBrains Mono",monospace; font-size:.78rem; letter-spacing:.14em;
      padding:.95rem 1.9rem; background:var(--emerald); color:var(--ink); text-decoration:none; border-radius:2px; font-weight:500; }
  svg { width:70px; margin-bottom:2rem; color:var(--emerald); }
</style>
</head>

<main>

</main>
